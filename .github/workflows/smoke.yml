name: Smoke

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  public-artifact-smoke:
    name: Public artifact smoke check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install runtime dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Compile Python files
        run: |
          python -m py_compile carbon-framework.py tests/smoke_public_artifact.py

      - name: Run public artifact smoke check
        run: |
          python tests/smoke_public_artifact.py
